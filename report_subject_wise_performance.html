<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>
        <div class="dashboard-content">
          <div class="container">
            <div class="card">
              <div class="card-body">
                <div class="row">
                  <div class="col-md-12">
                    <div class="bgc-white bd bdrs-3 p-20 mB-20"></div>
                    <h4 class="c-grey-900 mB-20 mt-6 mb-3">
                      Subject Wise Report
                    </h4>
                    <div class="row mb-3 align-items-end">
                      <div class="col mt-2">
                        <label for="test_type" class="required"
                          >Test Type</label
                        >
                        <select
                          class="form-select"
                          name="test_type"
                          id="test_type"
                          required
                        >
                          <option value="" selected disabled>
                            Select Test Type
                          </option>
                          <option value="Practice">Practice</option>
                          <option value="Actual">Actual</option>
                        </select>
                      </div>
                      <div class="col mt-2">
                        <label for="level" class="required">Level</label>
                        <select
                          class="form-select"
                          name="level"
                          id="level"
                          required
                        >
                          <option value="">Please select a Level</option>
                        </select>
                      </div>
                      <div class="col mt-2">
                        <label for="subject" class="required">Subject</label>
                        <select
                          class="form-select"
                          name="subject"
                          id="subject"
                          required
                        >
                          <option value="">Please select a Subject</option>
                        </select>
                      </div>
                      <div class="col mt-4">
                        <button
                          class="btn btn-primary btn-color"
                          type="button"
                          id="network_button"
                        >
                          View Report
                        </button>
                      </div>
                    </div>
                    <div class="mt-5" id="fetching_data" style="display: none">
                      <p>Fetching Data</p>
                    </div>
                    <div
                      class="result mt-4 p-3"
                      id="result_div"
                      style="display: none"
                    >
                      <div class="row">
                        <div class="stats-grid">
                          <div class="stat-card">
                            <div class="stat-number" id="s-att"></div>
                            <div class="stat-label">Attended</div>
                          </div>
                          <div class="stat-card">
                            <div class="stat-number" id="s-pass"></div>
                            <div class="stat-label">Passed</div>
                          </div>
                          <div class="stat-card">
                            <div class="stat-number" id="s-rate"></div>
                            <div class="stat-label">Pass Rate</div>
                          </div>
                          <div class="stat-card">
                            <div class="stat-number" id="s-time"></div>
                            <div class="stat-label">Avg Time (m)</div>
                          </div>
                        </div>
                      </div>
                      <div class="row">
                        <div class="report-card">
                          <div class="card-header">
                            <h2
                              id="view-title"
                              style="
                                margin: 0;
                                font-size: 1.4rem;
                                color: var(--dark);
                              "
                            >
                              All Subjects Overview
                            </h2>
                            <div class="toggle-group">
                              <button class="toggle-btn" id="btn-chart">
                                Chart
                              </button>
                              <button class="toggle-btn active" id="btn-table">
                                Table
                              </button>
                            </div>
                          </div>

                          <div class="breadcrumb" id="breadcrumb"></div>

                          <div
                            id="chart-wrapper"
                            class="hidden"
                            style="height: 400px"
                          >
                            <canvas id="drillChart"></canvas>
                          </div>

                          <div id="table-wrapper">
                            <table class="table table-bordered">
                              <thead>
                                <tr>
                                  <th>Name</th>
                                  <th>Attended</th>
                                  <th>Passed</th>
                                  <th>Success Rate</th>
                                  <th>Avg Time</th>
                                  <th>Difficulty</th>
                                </tr>
                              </thead>
                              <tbody id="table-body"></tbody>
                            </table>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script src="assets/js/cache/get_level.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="/assets/js/packages/mathjax-config.js"></script>
  <script
    type="module"
    src="/assets/js/pages/report/report_subject_wise_performance.js"
  ></script>
</html>
