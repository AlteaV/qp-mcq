<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>

  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>
        <div class="dashboard-content">
          <!-- Main Dashboard: List Classes -->
          <div id="management-div">
            <!-- Gradient Banner -->
            <div class="nd-banner">
              <div class="nd-banner-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                  <polyline points="17 6 23 6 23 12" />
                </svg>
              </div>
              <div>
                <h1 id="main-title">Class / Tag Management</h1>
                <p>Configure and manage classes</p>
              </div>
            </div>

            <div class="nd-card p-0">
              <div class="d-flex justify-content-end mt-4 me-4 mb-4">
                <button class="nd-btn-primary" id="add_class_btn">
                  <i class="fa-solid fa-plus me-2"></i>Add Class
                </button>
              </div>
              <div class="table-responsive">
                <table
                  id="class-table"
                  class="table table-bordered nd-table-override mb-0"
                >
                  <thead>
                    <tr>
                      <th style="width: 50px; text-align: center">#</th>
                      <th>Class Name</th>
                      <th style="text-align: right">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="class-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Secondary View: List Members of a Class -->
          <div id="member-management-div" class="hidden">
            <div
              class="nd-banner nd-banner-blue mb-4 d-flex justify-content-between align-items-center"
            >
              <div class="d-flex align-items-center gap-3">
                <button
                  type="button"
                  class="nd-btn-secondary"
                  id="back_to_classes"
                  style="padding: 6px 12px"
                >
                  <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="nd-banner-title m-0" id="class_title_display">
                  Class Members
                </h1>
              </div>
            </div>

            <div class="nd-card p-0">
              <div class="d-flex justify-content-end mt-4 me-4 mb-4">
                <button class="nd-btn-primary" id="add_members_to_class_btn">
                  <i class="fa-solid fa-user-plus me-2"></i>Add Students
                </button>
              </div>

              <div class="table-responsive">
                <table
                  id="member-table"
                  class="table table-bordered nd-table-override mb-0"
                >
                  <thead>
                    <tr>
                      <th style="width: 50px; text-align: center">#</th>
                      <th>Name</th>
                      <th>Email</th>
                      <th style="text-align: right">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="member-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Modal for Adding/Editing Class --><!-- starts here -->
          <div
            class="modal fade"
            id="modal"
            tabindex="-1"
            role="dialog"
            aria-labelledby="modalLabel"
            aria-hidden="true"
          >
            <div
              class="modal-dialog modal-dialog-centered modal-xl"
              role="document"
            >
              <div class="modal-content">
                <div class="modal-header">
                  <h4 class="modal-title" id="modal-title" id="modalLabel"></h4>
                  <button
                    type="button"
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close"
                    data-bs-toggle="modal"
                    data-bs-target="#modal"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <form id="class-form">
                    <input type="hidden" id="edit-class-id" />
                    <div class="mb-3">
                      <label
                        class="form-label fw-bold required"
                        style="color: #374151"
                        >Class Name</label
                      >
                      <input
                        type="text"
                        id="class-name-input"
                        class="nd-input"
                        required
                        placeholder="e.g. Batch 2024 - Section A"
                      />
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-4">
                      <button
                        type="button"
                        class="nd-btn-secondary"
                        data-dismiss="modal"
                        data-bs-toggle="modal"
                        data-bs-target="#modal"
                      >
                        Cancel
                      </button>
                      <button
                        type="submit"
                        class="nd-btn-primary"
                        id="form_submit"
                      >
                        Save Class
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <!-- ends here -->
          <!-- starts here -->
          <div
            class="modal fade"
            id="members_modal"
            tabindex="-1"
            role="dialog"
            aria-labelledby="modalLabel"
            aria-hidden="true"
          >
            <div
              class="modal-dialog modal-dialog-centered modal-xl"
              role="document"
            >
              <div class="modal-content">
                <div class="modal-header">
                  <h4 class="modal-title" id="modalLabel">Select Students</h4>
                  <button
                    type="button"
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close"
                    data-bs-toggle="modal"
                    data-bs-target="#modal_members"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <form id="form">
                    <div class="mb-3 d-flex flex-wrap gap-2">
                      <input
                        type="text"
                        id="student_search_input"
                        class="nd-input"
                        style="flex: 1; min-width: 200px"
                        placeholder="Search students by name or email..."
                      />
                      <button
                        class="nd-btn-secondary"
                        id="select_all_students_btn"
                      >
                        Select All
                      </button>
                    </div>

                    <div class="member-selection-list table-responsive">
                      <table
                        class="table table-bordered nd-table-override mb-0"
                      >
                        <thead>
                          <tr>
                            <th style="width: 40px"></th>
                            <th>Name</th>
                            <th>Email</th>
                          </tr>
                        </thead>
                        <tbody id="student_selection_body"></tbody>
                      </table>
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-4">
                      <button
                        type="button"
                        class="nd-btn-secondary"
                        data-dismiss="modal"
                        data-bs-toggle="modal"
                        data-bs-target="#modal_members"
                      >
                        Cancel
                      </button>
                      <button
                        type="button"
                        class="nd-btn-primary"
                        id="submit_member_selection"
                      >
                        Add Selected Students
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <!-- ends here -->
        </div>

        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>

    <script id="rendered-js" src="/assets/js/scripts.js"></script>
    <script
      type="module"
      src="/assets/js/pages/group_management/class_management.js"
    ></script>
  </body>
</html>
