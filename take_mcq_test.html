<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>

        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-clipboard-list w-7 h-7 text-white"
              >
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect>
                <path
                  d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                ></path>
                <path d="M12 11h4"></path>
                <path d="M12 16h4"></path>
                <path d="M8 11h.01"></path>
                <path d="M8 16h.01"></path>
              </svg>
            </div>
            <div>
              <h1>Take Test</h1>
              <p>View and attempt your scheduled tests</p>
            </div>
          </div>
          <!-- Loading -->
          <div class="nd-loading" id="fetching_data" style="display: none">
            <div class="nd-loading-dot"></div>
            <div class="nd-loading-dot"></div>
            <div class="nd-loading-dot"></div>
            <span>Fetching Data…</span>
          </div>

          <!-- Result Section -->
          <div class="result" id="result_div" style="display: none">
            <div
              class="nd-card"
              style="padding: 0; overflow: hidden; margin-bottom: 16px"
            >
              <table
                class="table table-bordered nd-table-override"
                style="margin: 0"
                width="100%"
                id="result_table"
              ></table>
            </div>
          </div>
        </div>
        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script defer src="/assets/js/packages/mathjax-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
  <script type="module" src="/assets/js/pages/mcq/take_mcq_test.js"></script>
  <!-- <script src="/assets/js/pages/mcq/view_template.js"></script> -->
</html>
