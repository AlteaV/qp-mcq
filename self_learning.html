<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>

  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>
        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
              </svg>
            </div>
            <div>
              <h1>Self Learning</h1>
              <p>Practice topic-wise questions at your own pace</p>
            </div>
          </div>

          <!-- Filter Card -->
          <div class="nd-card nd-filter-card">
            <div class="nd-filter-row">
              <div class="nd-field">
                <label for="subject" class="nd-label required">Subject</label>
                <select
                  class="nd-select"
                  name="subject"
                  id="subject"
                  required
                ></select>
              </div>
              <div class="nd-field d-none" id="section_div">
                <label for="section" class="nd-label required">Section</label>
                <select
                  class="nd-select"
                  name="section"
                  id="section"
                  required
                ></select>
              </div>
              <div class="nd-field d-none" id="topic_div">
                <label for="topic" class="nd-label required">Topic</label>
                <select
                  class="nd-select"
                  name="topic"
                  id="topic"
                  required
                ></select>
              </div>
              <div class="nd-field nd-btn-field">
                <button
                  class="nd-btn-primary"
                  type="button"
                  id="network_button"
                >
                  Take Test
                </button>
              </div>
            </div>
          </div>

          <!-- Loading -->
          <div class="nd-loading" id="fetching_data" style="display: none">
            <div class="nd-loading-dot"></div>
            <div class="nd-loading-dot"></div>
            <div class="nd-loading-dot"></div>
            <span>Fetching Data…</span>
          </div>

          <!-- Result Table (shown after submit) -->
          <div
            class="nd-card"
            style="padding: 0; overflow: hidden; display: none"
            id="result_table_wrap"
          >
            <table
              class="table table-bordered nd-table-override"
              style="margin: 0"
              width="100%"
              id="result_table"
            ></table>
          </div>

          <!-- Question View -->
          <div class="result" id="result_div" style="display: none">
            <div class="nd-card">
              <h5 class="nd-card-title" id="question_no"></h5>
              <div id="question_div"></div>
              <div class="nd-question-nav">
                <button
                  class="nd-btn-secondary"
                  type="button"
                  id="previous_question"
                  style="visibility: hidden"
                >
                  ← Previous
                </button>
                <button class="nd-btn-primary" type="button" id="next_question">
                  Next →
                </button>
              </div>
            </div>
            <div style="margin-top: 12px">
              <button class="nd-btn-primary" type="button" id="submit_test">
                Submit Test
              </button>
            </div>
          </div>
        </div>
        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script defer src="/assets/js/packages/mathjax-config.js"></script>
  <script src="/assets/js/pages/mcq/show_questions.js"></script>
  <script type="module" src="/assets/js/pages/mcq/self_learning.js"></script>
</html>
