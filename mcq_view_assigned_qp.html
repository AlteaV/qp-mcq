<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>
        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                <polyline points="17 6 23 6 23 12" />
              </svg>
            </div>
            <div>
              <h1>View Assigned Question Paper</h1>
              <p>Review assigned question papers, manage lockouts</p>
            </div>
          </div>

          <!-- Filter Card -->
          <div class="nd-card nd-filter-card">
            <div class="nd-filter-row">
              <div class="nd-field">
                <label for="type" class="nd-label required">Type</label>
                <select class="nd-select" name="type" id="type" required>
                  <option value="On Going">On Going</option>
                  <option value="Upcoming">Upcoming</option>
                  <option value="Completed">Completed</option>
                </select>
              </div>

              <div class="nd-field nd-btn-field">
                <button
                  class="nd-btn-primary"
                  type="button"
                  id="network_button"
                >
                  View Assigned QP
                </button>
              </div>
            </div>
          </div>
          <div class="mt-5" id="fetching_data" style="display: none">
            <p>Fetching Data</p>
          </div>

          <div class="nd-report-card report-card p-0" id="result_div">
            <div id="table-wrapper">
              <table
                class="table table-bordered nd-table-override mb-0"
                id="result_table"
              ></table>
            </div>
          </div>

          <div
            class="modal fade"
            id="modal"
            tabindex="-1"
            role="dialog"
            aria-labelledby="modalLabel"
            aria-hidden="true"
          >
            <div
              class="modal-dialog modal-dialog-centered modal-xl"
              role="document"
            >
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="modalTitle">
                    <b id="form_title">Students Locked Out</b>
                  </h5>
                  <button
                    type="button"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <table
                    class="table table-bordered nd-table-override"
                    width="100%"
                    id="locked_out_students_table"
                  ></table>
                </div>
                <div class="modal-footer">
                  <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                    id="close_id"
                  >
                    Close
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script type="module" src="/assets/js/pages/mcq/view_assigned_qp.js"></script>
</html>
