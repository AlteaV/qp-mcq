<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>

        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </div>
            <div>
              <h1>View Question Template</h1>
              <p>View and manage existing non-MCQ question templates</p>
            </div>
          </div>

          <div class="nd-card">
            <div id="template_selection_div">
              <div
                id="fetching_data"
                style="display: none"
              >
                <div class="nd-loading">
                  <div class="nd-loading-dot"></div>
                  <div class="nd-loading-dot"></div>
                  <div class="nd-loading-dot"></div>
                  <span>Fetching Data...</span>
                </div>
              </div>

              <div
                class="row mt-3"
                id="details"
                style="
                  padding-bottom: 20px;
                  padding-left: 10px;
                  padding-top: 20px;
                  display: none;
                "
              >
                <div class="table-responsive">
                  <table
                    id="template_table"
                    class="table table-bordered nd-table-override mb-0"
                    width="100%"
                  >
                    <thead>
                      <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Created On</th>
                        <th>Template</th>
                        <th>Total Marks</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody id="details_body"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <div
              id="exampleModalCenter"
              role="dialog"
              aria-labelledby="exampleModalCenterTitle"
              data-backdrop="static"
              data-keyboard="false"
              tabindex="-1"
              aria-hidden="true"
              class="modal fade"
            >
              <div
                class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-xl"
                role="document"
              >
                <div class="modal-content">
                  <div class="modal-header">
                    <h5
                      class="modal-title"
                      id="exampleModalCenterTitle"
                    >
                      New Question
                    </h5>
                    <button
                      type="button"
                      class="close"
                      aria-label="Close"
                      data-kt-modal-action="close"
                      data-bs-toggle="modal"
                      data-bs-target="#exampleModalCenter"
                    >
                      <span aria-hidden="true">&times;</span>
                    </button>
                  </div>
                  <div class="modal-body">
                    <div id="sectionsContainer" class="mb-5"></div>
                  </div>
                  <div class="modal-footer">
                    <button
                      type="button"
                      class="nd-btn-secondary"
                      data-kt-modal-action="close"
                      data-bs-toggle="modal"
                      data-bs-target="#exampleModalCenter"
                    >
                      Close
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
  <script src="/assets/js/cache/get_btl.js"></script>
  <script src="assets/js/pages/qp_gen/view_question_template.js"></script>
</html>
