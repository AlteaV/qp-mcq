<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>

        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                <polyline points="17 6 23 6 23 12" />
              </svg>
            </div>
            <div>
              <h1>Level Management</h1>
              <p>Configure and manage levels</p>
            </div>
          </div>

          <div class="nd-card p-0">
            <div class="d-flex justify-content-end mt-4 me-4 mb-4">
              <input
                class="nd-btn-primary"
                type="button"
                value="Add Level"
                id="network-button"
              />
            </div>

            <div class="mt-4" id="fetching_data" style="display: none">
              <div class="d-flex align-items-center gap-2 text-muted">
                <i class="fa-solid fa-spinner fa-spin"></i> Fetching Data...
              </div>
            </div>

            <div
              class="result mt-4 p-0 mb-0"
              id="result_div"
              style="display: none"
            >
              <div class="table-responsive">
                <table
                  class="table table-bordered nd-table-override mb-0"
                  width="100%"
                  id="result_table"
                ></table>
              </div>
            </div>
            <!-- Model start -->
            <div
              class="modal fade"
              id="modal"
              tabindex="-1"
              role="dialog"
              aria-labelledby="modalLabel"
              aria-hidden="true"
            >
              <div
                class="modal-dialog modal-dialog-centered modal-l"
                role="document"
              >
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">
                      <b id="form_title"></b>
                    </h5>
                    <button
                      type="button"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                    >
                      <span aria-hidden="true">&times;</span>
                    </button>
                  </div>
                  <div class="modal-body">
                    <form class="needs-validation" id="form" novalidate>
                      <input type="hidden" id="editIndex" value="-1" />
                      <div class="mb-3" id="level_id_div">
                        <label class="form-label fw-bold" style="color: #374151"
                          >Level ID</label
                        >
                        <div>
                          <span id="level_id" class="fw-medium"></span>
                        </div>
                      </div>
                      <div class="mb-3">
                        <label
                          for="level_name"
                          class="form-label fw-bold required"
                          style="color: #374151"
                          >Level Name</label
                        >
                        <input
                          type="text"
                          class="nd-input"
                          id="level_name"
                          name="level_name"
                          required
                        />
                        <div class="invalid-feedback">
                          Please enter Level Name.
                        </div>
                      </div>
                    </form>
                  </div>
                  <div class="modal-footer">
                    <button
                      type="button"
                      class="btn nd-btn-secondary"
                      data-dismiss="modal"
                      data-bs-toggle="modal"
                      data-bs-target="#modal"
                      id="close_id"
                    >
                      Close
                    </button>

                    <button
                      type="button"
                      class="btn nd-btn-primary"
                      id="form_submit"
                    >
                      Submit
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="dashboard-footer" id="footer-placeholder"></footer>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script defer src="/assets/js/packages/mathjax-config.js"></script>
  <script type="module" src="/assets/js/pages/mcq/manage_level.js"></script>
</html>
