<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>
        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </div>
            <div>
              <h1>Question Upload</h1>
              <p>Upload new questions via Excel template</p>
            </div>
          </div>

          <div class="nd-card">
            <div class="row mb-4 align-items-center">
              <div class="col">
                <p class="mb-0 text-secondary" style="font-weight: 500;">
                  Make sure that the Questions are stored in proper
                  format. Sample excel can be downloaded.
                </p>
              </div>
              <div class="col-auto">
                <button
                  class="nd-btn-outline"
                  type="button"
                  id="download_excel"
                >
                  <i class="fa-solid fa-download me-2"></i>Download sample
                </button>
              </div>
            </div>

            <div class="row align-items-end mb-4">
              <div class="col-md-3 col-sm-6 mb-2">
                <label for="level" class="nd-label required">Level</label>
                <select
                  class="nd-select"
                  name="level"
                  id="level"
                  required
                ></select>
              </div>
              <div class="col-md-3 col-sm-6 mb-2">
                <label for="subject" class="nd-label required">Subject</label>
                <select
                  class="nd-select"
                  id="subject"
                  name="subject"
                  required
                ></select>
              </div>
              <div class="col-md-4 col-sm-8 mb-2">
                <label for="file_input" class="nd-label required">Upload Questions</label>
                <input
                  class="nd-input"
                  type="file"
                  id="file_input"
                  accept=".xlsx, .xls, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel"
                />
              </div>
              <div class="col-md-2 col-sm-4 mb-2">
                <button
                  class="nd-btn-primary w-100"
                  type="button"
                  id="submit_excel"
                >
                  Scan Questions
                </button>
              </div>
            </div>

            <div
              class="mt-5"
              id="fetching_data"
              style="display: none"
            >
              <div class="nd-loading">
                <div class="nd-loading-dot"></div>
                <div class="nd-loading-dot"></div>
                <div class="nd-loading-dot"></div>
                <span>Fetching Data...</span>
              </div>
            </div>

            <div
              class="result mt-5"
              id="result_div"
              style="display: none"
            >
              <div class="table-responsive">
                <table
                  class="table table-bordered nd-table-override mb-0"
                  width="100%"
                  id="result_table"
                ></table>
              </div>
              <div class="row">
                <div class="col mt-4 d-flex justify-content-end">
                  <button
                    class="nd-btn-primary"
                    type="button"
                    id="save_question"
                  >
                    Save Questions
                  </button>
                </div>
              </div>

              <!-- Edit question modal start -->
              <div
                class="modal fade"
                id="modal"
                tabindex="-1"
                role="dialog"
                aria-labelledby="modalLabel"
                aria-hidden="true"
              >
                <div
                  class="modal-dialog modal-dialog-centered modal-xl"
                  role="document"
                >
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title" id="modalLabel">
                        Edit Question
                      </h5>
                      <button
                        type="button"
                        class="close"
                        data-dismiss="modal"
                        aria-label="Close"
                        data-bs-toggle="modal"
                        data-bs-target="#modal"
                      >
                        <span aria-hidden="true">&times;</span>
                      </button>
                    </div>
                    <div class="modal-body">
                      <form id="question_form">
                        <div class="row">
                          <div class="col">
                            <label for="question" class="nd-label required">Question</label>
                            <textarea
                              class="nd-input"
                              id="question"
                              rows="6"
                              required
                              placeholder="Type your question here..."
                              style="height: auto;"
                            ></textarea>
                          </div>
                        </div>
                        <div class="row mt-3">
                          <div class="col">
                            <!-- single image upload -->
                            <label for="image" class="nd-label">Image</label>
                            <input
                              type="file"
                              class="nd-input"
                              name="image"
                              id="image"
                              accept="image/*"
                            />
                          </div>
                        </div>
                      </form>
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="nd-btn-secondary"
                        data-dismiss="modal"
                        data-bs-toggle="modal"
                        data-bs-target="#modal"
                      >
                        Close
                      </button>
                      <button
                        type="button"
                        class="nd-btn-primary"
                        id="form_submit"
                      >
                        Save changes
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <!-- Edit question modal end -->
            </div>
          </div>
        </div>

        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
  <script src="/assets/js/packages/xlxs/xlsx.full.min.js"></script>
  <script src="assets/js/common/config.js"></script>
  <script src="assets/js/common/network_call.js"></script>
  <script src="assets/js/common/functions.js"></script>
  <script src="/assets/js/cache/get_btl.js"></script>
  <script
    type="module"
    src="assets/js/pages/qp_gen/qp_excel_upload.js"
  ></script>
</html>
