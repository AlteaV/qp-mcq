<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>
        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
                ></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
            </div>
            <div>
              <h1>Question Upload (Scan)</h1>
              <p>Upload and automatically scan questions from PDF files</p>
            </div>
          </div>

          <div
            class="nd-card"
            id="scan_question_input_div"
            style="display: none"
          >
            <div class="row align-items-end">
              <div class="col">
                <label for="level" class="nd-label required">Level</label>
                <select
                  class="nd-select"
                  name="level"
                  id="level"
                  required
                ></select>
              </div>
              <div class="col">
                <label for="subject" class="nd-label required">Subject</label>
                <input
                  class="nd-input"
                  id="subject"
                  type="text"
                  name="subject"
                  autocomplete="off"
                  required
                />
              </div>
              <div class="col">
                <label for="file_input" class="nd-label required"
                  >Upload Questions</label
                >
                <input
                  class="nd-input"
                  type="file"
                  id="file_input"
                  name="file_input"
                  accept="application/pdf"
                />
              </div>
              <div class="col-auto d-flex align-items-end">
                <button
                  class="nd-btn-primary w-100"
                  type="button"
                  id="scan_question"
                >
                  Scan Questions
                </button>
              </div>
            </div>
          </div>
          <div class="mt-5" id="fetching_data" style="display: none">
            <div class="nd-loading">
              <div class="nd-loading-dot"></div>
              <div class="nd-loading-dot"></div>
              <div class="nd-loading-dot"></div>
              <span>Fetching Data...</span>
            </div>
          </div>

          <div
            class="mt-0 mb-0 pb-0 result"
            id="status_div"
            style="display: none"
          >
            <div class="table-responsive">
              <table
                class="table table-bordered nd-table-override mb-0"
                width="100%"
                id="status_table"
              ></table>
            </div>
          </div>

          <div class="result mt-5" id="result_div" style="display: none">
            <div class="table-responsive">
              <table
                class="table table-bordered nd-table-override mb-0"
                width="100%"
                id="result_table"
              ></table>
            </div>
            <div class="row">
              <div class="col mt-4 d-flex justify-content-end">
                <button
                  class="nd-btn-secondary"
                  type="button"
                  id="cancel_button"
                >
                  Cancel
                </button>
                <button
                  class="nd-btn-primary ms-2"
                  type="button"
                  id="save_question"
                >
                  Save Questions
                </button>
              </div>
            </div>
          </div>
        </div>

        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script defer src="/assets/js/packages/mathjax-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
  <script src="assets/js/common/config.js"></script>
  <script src="assets/js/common/network_call.js"></script>
  <script src="assets/js/common/functions.js"></script>
  <script src="/assets/js/cache/get_btl.js"></script>
  <script type="module" src="assets/js/pages/qp_gen/qp_scan.js"></script>
</html>
