<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>
        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </div>
            <div>
              <h1>Question Generator</h1>
              <p>Generate non-MCQ question papers from templates</p>
            </div>
          </div>

          <div class="nd-card">
            <div
              id="fetching_data"
              style="display: none"
            >
              <div class="nd-loading">
                <div class="nd-loading-dot"></div>
                <div class="nd-loading-dot"></div>
                <div class="nd-loading-dot"></div>
                <span>Fetching Data...</span>
              </div>
            </div>

            <div
              class="row mt-3"
              id="details"
              style="
                padding-bottom: 20px;
                padding-left: 10px;
                padding-top: 20px;
                display: none;
              "
            >
              <div class="table-responsive">
                <table
                  id="template_table"
                  class="table table-bordered nd-table-override mb-0"
                  width="100%"
                >
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Name</th>
                      <th>Created On</th>
                      <th>Template</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="details_body"></tbody>
                </table>
              </div>
            </div>

            <div class="row">
              <div class="col mb-2">
                <div
                  class="row"
                  style="padding-bottom: 30px; display: none"
                  id="add_question_button_div"
                >
                  <div class="col mb-2" style="align-self: flex-end">
                    <button
                      class="nd-btn-primary"
                      type="button"
                      onclick="newQuestion()"
                    >
                      New Question
                    </button>
                  </div>
                </div>

                <div
                  id="questions_div"
                  style="display: none"
                >
                  <div
                    class="row mb-4 align-items-center"
                    id="add_question_button_div"
                  >
                    <div class="col-auto">
                      <button
                        type="button"
                        class="nd-btn-secondary"
                        onclick="changeTemplate()"
                        style="padding: 6px 12px"
                      >
                        <i class="fa fa-arrow-left"></i>
                      </button>
                    </div>
                    <div class="col">
                      <button
                        class="nd-btn-primary"
                        type="button"
                        onclick="changeTemplate()"
                      >
                        Change Template
                      </button>
                    </div>
                  </div>

                  <div
                    id="fetching_question"
                    style="display: none"
                  >
                    <div class="nd-loading">
                      <div class="nd-loading-dot"></div>
                      <div class="nd-loading-dot"></div>
                      <div class="nd-loading-dot"></div>
                      <span>Fetching Questions...</span>
                    </div>
                  </div>

                  <div id="sectionsContainer" class="mb-5"></div>

                  <div
                    class="row mb-4 align-items-end"
                    id="add_question_button_div"
                  >
                    <div class="col-md-4 col-sm-6 mb-2">
                      <label
                        for="question_paper_name"
                        class="nd-label required"
                        >Question Paper Name</label
                      >
                      <input
                        type="text"
                        class="nd-input"
                        id="question_paper_name"
                        name="question_paper_name"
                        placeholder=""
                        required
                      />
                    </div>
                    <div class="col-md-4 col-sm-6 mb-2">
                      <label
                        for="selected_subject"
                        class="nd-label required"
                        >Selected Subject</label
                      >
                      <input
                        type="text"
                        class="nd-input"
                        id="selected_subject"
                        name="selected_subject"
                        placeholder=""
                        required
                        disabled
                      />
                    </div>
                    <div class="col-md-4 col-sm-12 mb-2 d-flex justify-content-md-end">
                      <button
                        class="nd-btn-primary w-100"
                        type="button"
                        onclick="getQuestionId()"
                      >
                        Save Question
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script defer src="/assets/js/packages/mathjax-config.js"></script>
  <script src="assets/js/pages/qp_gen/network_function_nonmcq.js"></script>
  <script src="assets/js/pages/qp_gen/get_question_template.js"></script>
  <script src="assets/js/pages/qp_gen/generate_nonmcq_question_paper.js"></script>
</html>
