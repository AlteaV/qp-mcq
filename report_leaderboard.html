<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>

        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                <polyline points="17 6 23 6 23 12" />
              </svg>
            </div>
            <div>
              <h1>Leaderboard</h1>
              <p>Monitor top performers and overall ranking trends</p>
            </div>
          </div>

          <!-- Leaderboard Content Card -->
          <div class="nd-card report-card p-6">
            <!-- Filters -->
            <div class="row mb-3 align-items-end">
              <div class="col mt-2" id="level_div">
                <label class="form-label fw-bold" style="color: #374151"
                  >Level</label
                >
                <select class="nd-select" id="level" name="level" required>
                  <option value="" selected disabled>Choose level</option>
                </select>
              </div>

              <div class="col mt-2" id="subject_div">
                <label class="form-label fw-bold" style="color: #374151"
                  >Subject</label
                >
                <select
                  class="nd-select"
                  name="subject"
                  id="subject"
                  required
                ></select>
              </div>

              <div class="col mt-2" id="section_div">
                <label class="form-label fw-bold" style="color: #374151"
                  >Section</label
                >
                <select class="nd-select" name="section" id="section"></select>
              </div>

              <div class="col mt-2" id="topic_div" style="display: none">
                <label class="form-label fw-bold" style="color: #374151"
                  >Topic</label
                >
                <select class="nd-select" name="topic" id="topic"></select>
              </div>

              <div class="col mt-4">
                <button
                  class="nd-btn-primary nd-tp-view-btn"
                  type="button"
                  id="network_button"
                >
                  View Top Performers
                </button>
              </div>
            </div>
          </div>

          <!-- Loading -->
          <div class="mt-4" id="fetching_data" style="display: none">
            <div class="d-flex align-items-center gap-2 text-muted">
              <i class="fa-solid fa-spinner fa-spin"></i> Fetching Data...
            </div>
          </div>

          <!-- Results -->
          <div
            class="nd-report-card report-card p-0"
            id="result_div"
            style="display: none"
          >
            <div id="table-wrapper">
              <table
                class="table table-bordered nd-table-override mb-0"
                id="result_table"
              ></table>
            </div>
          </div>
        </div>

        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>

    <!-- Modal kept for JS compatibility -->
    <div
      class="modal fade"
      id="modal"
      tabindex="-1"
      role="dialog"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal_title">
              <b id="form_title"></b>
            </h5>
            <button type="button" data-bs-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <form class="needs-validation" id="form" novalidate>
              <input type="hidden" id="editIndex" value="-1" />
              <div class="row mb-3">
                <div class="col-auto">
                  <label for="topic_name" class="required">Topic</label>
                </div>
                <div class="col">
                  <input
                    type="text"
                    class="form-control"
                    id="topic_name"
                    name="topic_name"
                    autocomplete="off"
                    required
                  />
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
              data-bs-toggle="modal"
              data-bs-target="#modal"
              id="close_id"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary" id="form_submit">
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>

    <script id="rendered-js" src="/assets/js/scripts.js"></script>
    <script src="assets/js/cache/get_level.js"></script>
    <script
      type="module"
      src="/assets/js/pages/report/report_leaderboard.js"
    ></script>
  </body>
</html>
