<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Take Test</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/template.css" rel="stylesheet" />
  </head>
  <body>
    <div class="dashboard-content" style="padding: 0px">
      <!-- Header -->
      <div class="exam-header">
        <div class="exam-title" id="examTitle"></div>
        <div class="timer" id="timer" style="display: none">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          <span id="timer-text">0 min : 0 sec</span>
        </div>
      </div>

      <!-- Main -->
      <div class="exam-container">
        <!-- Left Panel -->
        <div class="left-panel" id="left_panel" style="display: none"></div>

        <!-- Right Panel -->
        <div class="right-panel" id="rightPanel" style="display: none">
          <div id="subjectsContainer"></div>
          <div class="legend" id="legend">
            <div class="legend-item">
              <div class="legend-box attempted"></div>
              <span>Attempted (<span id="attemptedCount">0</span>)</span>
            </div>
            <div class="legend-item">
              <div class="legend-box unattempted"></div>
              <span>Unattempted (<span id="unattemptedCount">0</span>)</span>
            </div>
            <div class="legend-item" id="reviewLegend1" style="display: none">
              <div class="legend-box review"></div>
              <span>Review (<span id="reviewCount1">0</span>)</span>
            </div>
            <div class="legend-item" id="skipLegend1" style="display: none">
              <div class="legend-box skip"></div>
              <span>Skip (<span id="skipCount1">0</span>)</span>
            </div>
          </div>
          <!-- Submit Test lives here so it's always visible in the sidebar -->
        </div>
      </div>
    </div>

    <!-- Footer: prev / next navigation only -->
    <div class="exam-footer" id="exam_footer">
      <div class="footer-left" style="display: none">
        <button class="arrow-btn">❮</button>
        <button class="saveNextBtn" id="next_btn">Next</button>
      </div>

      <button
        class="tui-nav-submit"
        id="tui_submit_btn"
        style="margin-left: auto !important"
      >
        Submit Test
      </button>
      <button
        class="tui-submit-btn saveResponseBtn"
        id="submit_test"
        style="display: none"
      >
        Submit Test
      </button>
    </div>

    <!-- Fullscreen overlay -->
    <div
      id="fullscreenOverlay"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 99999;
      "
    >
      <div
        style="
          text-align: center;
          color: white;
          padding: 40px;
          max-width: 500px;
        "
      >
        <h2 style="font-size: 28px; margin-bottom: 20px">
          🖥️ Fullscreen Required
        </h2>
        <p style="font-size: 18px; margin-bottom: 30px; line-height: 1.6">
          This test must be taken in fullscreen mode. Click the button below to
          continue in fullscreen.
        </p>
        <button
          id="enterFullscreenBtn"
          style="
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
          "
        >
          Enter Fullscreen
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script id="rendered-js" src="/assets/js/scripts.js"></script>
    <script defer src="/assets/js/packages/mathjax-config.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"
    ></script>
    <script
      type="module"
      src="/assets/js/pages/mcq/mcq_take_test_ui_template.js"
    ></script>
  </body>
</html>
