<!DOCTYPE html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>

        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </div>
            <div>
              <h1>View Question Paper</h1>
              <p>View, manage and assign generated question papers</p>
            </div>
          </div>

          <div class="nd-card">
            <div class="mt-2" id="fetching_data" style="display: none">
              <div class="nd-loading">
                <div class="nd-loading-dot"></div>
                <div class="nd-loading-dot"></div>
                <div class="nd-loading-dot"></div>
                <span>Fetching Data...</span>
              </div>
            </div>

            <div
              class="result mt-3"
              id="result_div"
              style="display: none"
            >
              <div class="table-responsive">
                <table
                  class="table table-bordered nd-table-override mb-0"
                  width="100%"
                  id="result_table"
                ></table>
              </div>
            </div>

            <!-- AssignQP modal :: BEGIN -->
            <div
              class="modal fade"
              id="groups_modal"
              tabindex="-1"
              role="dialog"
              aria-labelledby="modalLabel"
              aria-hidden="true"
            >
              <div
                class="modal-dialog modal-dialog-centered modal-lg"
                role="document"
              >
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="modal_label">
                      Assign Question Paper
                    </h5>
                    <button
                      type="button"
                      class="btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                    ></button>
                  </div>
                  <div class="modal-body">
                    <form
                      class="needs-validation"
                      id="form_id"
                      novalidate
                    >
                      <input
                        type="hidden"
                        class="form-control"
                        id="qp_id"
                        name="qp_id"
                        autocomplete="off"
                        required
                      />
                      <div class="row mb-3">
                        <div class="col">
                          <label for="group" class="nd-label required">Group</label>
                          <select
                            class="nd-select"
                            id="group"
                            name="group"
                            required
                          ></select>
                        </div>
                      </div>
                      <div class="row mb-3">
                        <div class="col">
                          <label for="start_date_time" class="nd-label required">
                            Start Date & Time</label
                          >
                          <input
                            type="datetime-local"
                            class="nd-input"
                            id="start_date_time"
                            name="start_date_time"
                            autocomplete="off"
                            required
                          />
                          <div class="invalid-feedback">
                            Please provide a valid Start Date & Time
                          </div>
                        </div>
                      </div>
                      <div class="row mb-3">
                        <div class="col">
                          <label for="end_date_time" class="nd-label required">
                            End Date & Time</label
                          >
                          <input
                            type="datetime-local"
                            class="nd-input"
                            id="end_date_time"
                            name="end_date_time"
                            autocomplete="off"
                            required
                          />
                          <div class="invalid-feedback">
                            Please provide a valid End Date & Time
                          </div>
                        </div>
                      </div>
                      <div class="row mb-3">
                        <div class="col">
                          <label for="test_type" class="nd-label required">Test Type</label>
                          <select
                            class="nd-select"
                            id="test_type"
                            name="test_type"
                            required
                          >
                            <option value="">Select Test Type</option>
                            <option value="Practice">
                              Practice Test
                            </option>
                            <option value="Actual">Actual Test</option>
                          </select>
                        </div>
                      </div>

                      <div class="row mb-3 align-items-center">
                        <div class="col-md-6 mb-2">
                          <label for="max_attempts" class="nd-label required">Max Attempts</label>
                          <select
                            class="nd-select"
                            id="max_attempts"
                            name="max_attempts"
                            required
                          >
                            <option value="">
                              Select Max Attempts
                            </option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                          </select>
                        </div>
                        <div class="col-md-6 mb-2">
                          <label class="nd-label required">Shuffle Questions</label>
                          <div class="mt-2">
                            <div class="form-check form-check-inline">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="shuffle_questions"
                                id="shuffle_yes"
                                value="yes"
                                required
                              />
                              <label
                                class="form-check-label nd-label"
                                for="shuffle_yes"
                                style="font-weight: 500;"
                              >
                                Yes
                              </label>
                            </div>
                            <div class="form-check form-check-inline">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="shuffle_questions"
                                id="shuffle_no"
                                value="no"
                                required
                              />
                              <label
                                class="form-check-label nd-label"
                                for="shuffle_no"
                                style="font-weight: 500;"
                              >
                                No
                              </label>
                            </div>
                          </div>
                        </div>
                      </div>
                    </form>
                  </div>
                  <div class="modal-footer">
                    <button
                      type="button"
                      class="nd-btn-secondary"
                      data-bs-dismiss="modal"
                    >
                      Close
                    </button>
                    <button
                      type="button"
                      class="nd-btn-primary"
                      id="form_submit"
                    >
                      Submit
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <!-- AssignQP modal :: END -->

            <!-- ViewQP modal :: BEGIN -->
            <div
              class="modal fade"
              id="view_qp_modal"
              tabindex="-1"
              role="dialog"
              aria-labelledby="modalLabel"
              aria-hidden="true"
            >
              <div
                class="modal-dialog modal-dialog-centered modal-xl"
                role="document"
              >
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="vqp_modal_label"></h5>
                    <button
                      type="button"
                      class="btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                    ></button>
                  </div>
                  <div class="modal-body">
                    <div id="vqp_body">
                      <div class="table-responsive">
                        <table
                          class="table table-bordered nd-table-override mb-0"
                          width="100%"
                          id="qp_table"
                        ></table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- ViewQP modal :: END -->
          </div>
        </div>
        <footer class="dashboard-footer" id="footer-placeholder"></footer>
      </div>
    </div>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script defer src="/assets/js/packages/mathjax-config.js"></script>
  <script
    type="module"
    src="/assets/js/pages/qp_gen/view_question_paper.js"
  ></script>
</html>
