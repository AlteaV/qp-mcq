<!-- Hamburger -->
<a href="#!" class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar">
  <i class="fas fa-bars"></i>
</a>

<div class="d-flex align-items-center gap-4">
  <div class="d-flex align-items-center gap-2" style="cursor: pointer">
    <img
      src="/assets/img/testninja.png"
      alt="Test Ninja Logo"
      class="img-fluid"
      style="max-width: 100px; max-height: 100px; object-fit: contain"
    />
  </div>

  <div class="d-flex align-items-center gap-1" id="top_bar_nav_items"></div>
</div>
<!-- Spacer -->
<div style="flex: 1"></div>

<!-- User profile pill -->
<div class="dropdown ms-auto">
  <a
    href="#"
    class="d-block link-dark text-decoration-none dropdown-toggle"
    id="dropdownMenuLink"
    data-bs-toggle="dropdown"
    aria-expanded="false"
  >
    <div
      style="
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, #60a5fa, #2563eb);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 11px;
        font-weight: 700;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
        flex-shrink: 0;
      "
      id="user_initial"
    ></div>
    <span
      id="user_name"
      style="
        color: white;
        font-size: 0.875rem;
        font-weight: 500;
        font-family: &quot;Inter&quot;, sans-serif;
      "
    ></span
    ><i class="fas fa-chevron-down ms-2" style="font-size: 0.75rem"></i>
  </a>
  <ul
    class="dropdown-menu dropdown-menu-end text-small"
    aria-labelledby="dropdownMenuLink"
  >
    <li>
      <a class="dropdown-item" href="#" onclick="logout()"
        ><i class="fas fa-sign-out-alt"></i>Sign out</a
      >
    </li>
  </ul>
</div>
