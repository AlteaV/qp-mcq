<meta charset="UTF-8" />
<title>Test Ninja</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.0/css/all.min.css" />
<link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
<link rel="stylesheet" href="/assets/css/dashboard.css" />
<style>
  body, * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  /* Sidebar brand header already handled by partial – reset dashboard.css override */
  .dashboard-nav > header { display: none; }
  /* Nav items use Inter */
  .dashboard-nav-item, .dashboard-nav-dropdown-item { font-family: 'Inter', sans-serif; font-size: 0.875rem; }
  /* Stat card icon containers – Figma colored backgrounds */
  .ud-stat-icon-blue   { background:#dbeafe; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ud-stat-icon-green  { background:#dcfce7; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ud-stat-icon-purple { background:#ede9fe; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ud-stat-icon-orange { background:#ffedd5; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ud-stat-icon-blue   svg { color:#2563eb; stroke:#2563eb; }
  .ud-stat-icon-green  svg { color:#16a34a; stroke:#16a34a; }
  .ud-stat-icon-purple svg { color:#7c3aed; stroke:#7c3aed; }
  .ud-stat-icon-orange svg { color:#ea580c; stroke:#ea580c; }
  /* Stat card layout – horizontal with icon left */
  .ud-stat-card { flex-direction:row; align-items:center; gap:16px; min-height:80px; padding:16px 20px; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .ud-stat-card .ud-stat-info { display:flex; flex-direction:column; gap:2px; }
  .ud-stat-card .ud-stat-label { font-size:0.78rem; color:#6b7280; font-weight:500; margin:0; }
  .ud-stat-card .ud-stat-value { font-size:1.45rem; font-weight:700; color:#111827; margin:0; line-height:1.2; }
  /* Section cards rounded Figma style */
  .ud-section-card { border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06); border:1px solid #f3f4f6; }
  .ud-section-card h5 { font-size:0.9rem; font-weight:600; color:#111827; }
  /* Subject bars – gradient matching Figma */
  .ud-subj-bar { background: linear-gradient(90deg, #2563eb, #60a5fa); border-radius:6px; }
  /* Quiz score colors */
  .ud-quiz-marks { color:#16a34a; }
  /* Body bg */
  body { background-color:#f0f4f9 !important; }
  /* Dashboard content padding matches Figma */
  .dashboard-content { padding:24px 32px; }
  /* Welcome text style */
  #ud-welcome-text { font-size:1.25rem; font-weight:600; color:#111827; }
  .ud-welcome-section p { color:#9ca3af; font-size:0.875rem; margin:2px 0 0; }
</style>
