<!doctype html>
<html lang="en">
  <head id="header-placeholder">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="/assets/css/dashboard.css" rel="stylesheet" />
    <link href="/assets/css/new_design.css" rel="stylesheet" />
  </head>
  <body translate="no">
    <div class="dashboard" id="side-bar-placeholder">
      <div class="dashboard-app">
        <header class="dashboard-toolbar" id="top-bar-placeholder"></header>

        <div class="dashboard-content">
          <!-- Gradient Banner -->
          <div class="nd-banner">
            <div class="nd-banner-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                <polyline points="17 6 23 6 23 12" />
              </svg>
            </div>
            <div>
              <h1>User Management</h1>
              <p>Manage users, roles, and classes</p>
            </div>
          </div>

          <div class="nd-card nd-filter-card">
            <div class="nd-filter-row">
              <div style="flex: 1; min-width: 250px">
                <label
                  for="search"
                  class="form-label fw-bold"
                  style="color: #374151"
                  >Search Users</label
                >
                <input
                  class="nd-input"
                  type="text"
                  placeholder="Search by name or email"
                  id="search"
                />
              </div>

              <div style="width: 200px">
                <label
                  for="filter-role"
                  class="form-label fw-bold"
                  style="color: #374151"
                  >Role</label
                >
                <select
                  class="nd-select"
                  name="filter-role"
                  id="filter-role"
                  required
                >
                  <option value="All">All Roles</option>
                  <option value="TestTaker" selected>Students</option>
                  <option value="TestCoordinator">Teachers</option>
                </select>
              </div>

              <div style="width: 200px">
                <label
                  for="filter-status"
                  class="form-label fw-bold"
                  style="color: #374151"
                  >Status</label
                >
                <select
                  class="nd-select"
                  name="filter-status"
                  id="filter-status"
                  required
                >
                  <option value="All">All Statuses</option>
                  <option value="Active">Active</option>
                  <option value="Inactive">Inactive</option>
                </select>
              </div>

              <div>
                <button
                  class="nd-btn-secondary"
                  type="button"
                  id="search_button"
                >
                  Search
                </button>
              </div>
            </div>
          </div>

          <div class="nd-card p-0">
            <!-- SEARCH AND FILTER ROW -->
            <div class="d-flex flex-wrap align-items-end gap-3 mt-4 me-4 mb-4">
              <div class="ms-auto">
                <button class="nd-btn-primary" type="button" id="add_user">
                  <i class="fa-solid fa-plus me-2"></i> Add User
                </button>
              </div>
            </div>
            <div class="mt-5" id="fetching_data" style="display: none">
              <p>Fetching Data</p>
            </div>

            <div class="result mt-4" id="result_div" style="display: none">
              <table
                class="table table-bordered nd-table-override mb-0"
                width="100%"
                id="result_table"
              ></table>
            </div>

            <div class="mt-4">
              <table
                id="user-table"
                class="table table-bordered nd-table-override mb-0"
              >
                <thead>
                  <tr>
                    <th style="width: 50px; text-align: center">#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Class</th>
                    <th>Actions</th>
                    <th class="actions-col" style="text-align: right">
                      Status
                    </th>
                  </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
              </table>

              <footer class="footer">
                <div class="show-count" id="user-count-footer">
                  Showing <span id="current-user-start">0</span> to
                  <span id="current-user-end">0</span> of
                  <span id="current-user-count">0</span> users
                </div>
                <div class="pagination" id="pagination-controls"></div>
              </footer>
            </div>
            <!-- starts here -->
            <div
              class="modal fade"
              id="modal"
              tabindex="-1"
              role="dialog"
              aria-labelledby="modalLabel"
              aria-hidden="true"
            >
              <div
                class="modal-dialog modal-dialog-centered modal-xl"
                role="document"
              >
                <div class="modal-content">
                  <div class="modal-header">
                    <h4 class="modal-title" id="modal-title">Add New User</h4>
                    <button
                      type="button"
                      class="close"
                      data-dismiss="modal"
                      aria-label="Close"
                      data-bs-toggle="modal"
                      data-bs-target="#modal"
                    >
                      <span aria-hidden="true">&times;</span>
                    </button>
                  </div>
                  <div class="modal-body">
                    <form id="user-form">
                      <input type="hidden" id="edit-user-id" />

                      <div
                        id="add-method-selector"
                        style="
                          display: flex;
                          gap: 1rem;
                          margin-bottom: 1rem;
                          padding-bottom: 0.5rem;
                          border-bottom: 1px solid var(--border-color);
                        "
                      >
                        <label style="cursor: pointer">
                          <input
                            type="radio"
                            name="addMethod"
                            value="individual"
                            checked
                          />
                          Individual User
                        </label>
                        <label style="cursor: pointer">
                          <input type="radio" name="addMethod" value="bulk" />
                          Bulk Add (Excel)
                        </label>
                      </div>

                      <div
                        style="display: flex; flex-direction: column; gap: 1rem"
                      >
                        <form id="user-section">
                          <div
                            id="individual-add-section"
                            style="
                              display: flex;
                              flex-direction: column;
                              gap: 1rem;
                            "
                          >
                            <div>
                              <label
                                class="form-label required"
                                style="
                                  font-size: 0.875rem;
                                  color: var(--text-muted);
                                  margin-bottom: 0.25rem;
                                "
                                >Full Name</label
                              >
                              <input
                                type="text"
                                id="user-name-input"
                                placeholder="Full Name"
                                class="form-control"
                                required
                              />
                            </div>
                            <div>
                              <label
                                class="form-label required"
                                style="
                                  font-size: 0.875rem;
                                  color: var(--text-muted);
                                  margin-bottom: 0.25rem;
                                "
                                >Email Address</label
                              >
                              <input
                                type="email"
                                id="user-email-input"
                                placeholder="Email Address"
                                class="form-control"
                                required
                              />
                            </div>
                            <div>
                              <label
                                class="form-label required"
                                style="
                                  font-size: 0.875rem;
                                  color: var(--text-muted);
                                  margin-bottom: 0.25rem;
                                "
                                >Role</label
                              >
                              <select
                                id="user-role-input"
                                class="form-select"
                                required
                              >
                                <option value="TestTaker">Student</option>
                                <option value="TestCoordinator">Teacher</option>
                              </select>
                            </div>
                          </div>
                        </form>

                        <div
                          id="bulk-add-section"
                          style="
                            display: none;
                            flex-direction: column;
                            gap: 1rem;
                          "
                        >
                          <div
                            style="
                              background: #f8fafc;
                              padding: 1rem;
                              border-radius: 8px;
                              border: 1px solid var(--border-color);
                            "
                          >
                            <p
                              style="
                                font-size: 0.875rem;
                                color: var(--text-muted);
                                margin-bottom: 0.5rem;
                              "
                            >
                              <i
                                class="fa-solid fa-circle-info"
                                style="color: var(--primary)"
                              ></i>
                              Excel must contain the columns:
                              <b>User Name</b>, <b>Email</b>.
                              <i
                                >(All uploaded users will automatically default
                                to the Student role).</i
                              >
                            </p>
                          </div>
                          <div>
                            <label
                              class="form-label"
                              style="
                                font-size: 0.875rem;
                                color: var(--text-muted);
                                margin-bottom: 0.25rem;
                              "
                              >Upload Excel File</label
                            >
                            <input
                              type="file"
                              id="bulk-excel-input"
                              accept=".xlsx, .xls, .csv"
                              class="form-control"
                            />
                          </div>
                        </div>

                        <div
                          id="optional-class-assignment"
                          style="margin-top: 0.5rem"
                        >
                          <label
                            class="form-label"
                            style="
                              font-size: 0.875rem;
                              color: var(--text-muted);
                              margin-bottom: 0.25rem;
                            "
                            >Assign to Class (Optional)</label
                          >
                          <select class="form-select" id="user_class_select">
                            <option value="">Select Class...</option>
                          </select>
                        </div>

                        <div class="d-flex justify-content-end">
                          <button
                            type="button"
                            class="nd-btn-secondary me-4"
                            data-dismiss="modal"
                            data-bs-toggle="modal"
                            data-bs-target="#modal"
                          >
                            Cancel
                          </button>
                          <button type="submit" class="nd-btn-primary">
                            Save User
                          </button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
            <!-- ends here -->
          </div>
        </div>
      </div>
    </div>
    <footer class="dashboard-footer" id="footer-placeholder"></footer>
  </body>
  <script id="rendered-js" src="/assets/js/scripts.js"></script>
  <script src="/assets/js/packages/xlxs/xlsx.full.min.js"></script>
  <script
    type="module"
    src="/assets/js/pages/group_management/user_management.js"
  ></script>
</html>
